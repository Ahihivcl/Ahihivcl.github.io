services:
  - type: web
    name: qlctcn-demo-app
    runtime: node
    rootDir: app/backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DB_SSL
        value: true
      - key: CORS_ORIGIN
        sync: false
