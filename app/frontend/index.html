<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supabase App QLCTCN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell">
    <section id="authCard" class="card login-card">
      <h2>Dang nhap Supabase</h2>
      <p>Dung email/password da tao trong Authentication.</p>
      <form id="loginForm">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="ban@example.com" required>

        <label for="password">Mat khau</label>
        <input id="password" name="password" type="password" required>

        <button type="submit">Dang nhap</button>
      </form>
      <button id="signupBtn" class="outline" type="button">Tao tai khoan moi</button>
      <p id="authMessage" class="message"></p>
    </section>

    <section id="appPanel" class="card hidden">
      <header class="topbar">
        <div>
          <h2 id="welcome">Xin chao</h2>
          <p id="roleBadge" class="badge">Role: user</p>
        </div>
        <div class="top-actions">
          <button id="logoutBtn" class="outline" type="button">Dang xuat</button>
        </div>
      </header>

      <section class="grid">
        <article class="box">
          <h3>Tao du lieu test</h3>
          <form id="walletForm" class="stack">
            <input id="walletName" placeholder="Ten vi (vd: Momo)" required>
            <input id="walletType" placeholder="Loai vi (vd: e-wallet)" required>
            <button type="submit">Them vi</button>
          </form>
          <form id="categoryForm" class="stack mt8">
            <input id="categoryName" placeholder="Ten danh muc" required>
            <select id="categoryKind" required>
              <option value="expense">expense</option>
              <option value="income">income</option>
              <option value="long_term">long_term</option>
            </select>
            <button type="submit">Them danh muc</button>
          </form>

          <h3 class="mt16">Giao dich</h3>
          <form id="txForm" class="stack">
            <input id="txName" placeholder="Ten giao dich" required>
            <input id="txAmount" type="number" min="1" step="0.01" placeholder="So tien" required>
            <input id="txDate" type="date" required>
            <select id="txCategory" required></select>
            <select id="txWallet" required></select>
            <input id="txNote" placeholder="Ghi chu (khong bat buoc)">
            <button type="submit">Them giao dich</button>
          </form>
          <p id="appMessage" class="message"></p>
        </article>

        <article class="box">
          <h3>Danh sach giao dich (RLS)</h3>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Ten</th>
                  <th>So tien</th>
                  <th>Ngay</th>
                  <th>Danh muc</th>
                  <th>Vi</th>
                </tr>
              </thead>
              <tbody id="txTable"></tbody>
            </table>
          </div>
        </article>
      </section>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
